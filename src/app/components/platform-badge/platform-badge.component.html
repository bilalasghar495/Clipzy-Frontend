<span class="badge" [style.--accent]="meta.color">
  <span class="icon" aria-hidden="true">
    @switch (platform) {

      @case ('tiktok') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74
                   2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05
                   A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43V8.93a8.16 8.16 0 0 0
                   4.77 1.52V7a4.85 4.85 0 0 1-1.84-.31z"/>
        </svg>
      }

      @case ('youtube') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0
                   .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5
                   9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8z"/>
          <polygon fill="white" points="9.6,15.6 15.8,12 9.6,8.4"/>
        </svg>
      }

      @case ('instagram') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      }

      @case ('snapchat') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2c3 0 5.5 2.2 5.5 5.4 0 1.6-.1 3-.1 3l1.5 1c.5.3.4.9-.1 1.2l-1.6.8
                   c.2 1 1.2 2.7 3.2 3.2.4.1.5.6.2.9-.7.7-2 1-3 1.1-.1.3-.3 1-.4 1.2-.2.3-.6.4-1
                   .3-.8-.2-1.6-.4-2.6-.4-1 0-1.7.4-2.7 1-1 .7-2 1.3-3.4 1.3s-2.4-.6-3.4-1.3
                   c-1-.6-1.7-1-2.7-1-1 0-1.8.2-2.6.4-.4.1-.8 0-1-.3-.1-.2-.3-.9-.4-1.2-1-.1
                   -2.3-.4-3-1.1-.3-.3-.2-.8.2-.9 2-.5 3-2.2 3.2-3.2l-1.6-.8c-.5-.3-.6-.9-.1
                   -1.2l1.5-1s-.1-1.4-.1-3C6.5 4.2 9 2 12 2z"/>
        </svg>
      }

      @case ('pinterest') {
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a10 10 0 0 0-3.6 19.3c-.1-.8-.2-2 0-2.9l1.3-5.4s-.3-.7-.3-1.6
                   c0-1.5.9-2.7 2-2.7.9 0 1.4.7 1.4 1.5 0 .9-.6 2.3-.9 3.6-.3 1 .5 1.9 1.6
                   1.9 1.9 0 3.4-2 3.4-5 0-2.6-1.9-4.4-4.6-4.4a4.7 4.7 0 0 0-4.9 4.7c0 .9.4
                   1.9.8 2.5.1.1.1.2.1.3l-.3 1.2c0 .2-.2.2-.4.1-1.3-.6-2.1-2.5-2.1-4
                   0-3.3 2.4-6.3 6.9-6.3 3.6 0 6.4 2.6 6.4 6 0 3.6-2.3 6.5-5.4 6.5-1.1
                   0-2.1-.6-2.4-1.2l-.7 2.5c-.2 1-.9 2.2-1.4 3A10 10 0 1 0 12 2z"/>
        </svg>
      }

      @default {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 4"/>
          <circle cx="12" cy="17" r="1" fill="currentColor"/>
        </svg>
      }

    }
  </span>
  @if (!iconOnly) {
    <span class="label">{{ meta.label }}</span>
  }
</span>
