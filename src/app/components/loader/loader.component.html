<div class="loader-shell" role="status" aria-live="polite" aria-label="Processing video">

  <!-- Animated ring stack -->
  <div class="loader-rings" aria-hidden="true">
    <div class="ring ring-outer"></div>
    <div class="ring ring-mid"></div>
    <div class="ring-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/>
        <path d="M6 11l6 6 6-6"/>
        <path d="M5 21h14"/>
      </svg>
    </div>
  </div>

  <!-- Text -->
  <div class="loader-content">
    <p class="loader-label">{{ label }}</p>

    <!-- Indeterminate progress bar -->
    <div class="loader-track" aria-hidden="true">
      <div class="loader-fill"></div>
    </div>

    <p class="loader-hint">Usually takes 5 – 15 seconds</p>
  </div>

</div>
